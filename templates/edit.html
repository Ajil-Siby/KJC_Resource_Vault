<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuning Node | Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #02040a; --neon-blue: #00d2ff; --neon-purple: #9d50bb; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #02040a; z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid var(--neon-blue); border-radius: 25px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .hero { background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .form-control, .form-select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white !important; padding: 12px; }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-5">
                    <h2 class="hero text-center mb-4 text-uppercase">Tuning Node</h2>
                    <form action="/edit/{{ item._id }}" method="POST">
                        <div class="mb-3">
                            <label class="small text-info fw-bold mb-2">IDENTIFIER</label>
                            <input type="text" name="title" class="form-control" value="{{ item.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-info fw-bold mb-2">DATA STREAM URL</label>
                            <input type="url" name="url" class="form-control" value="{{ item.url }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="small text-info fw-bold mb-2">CLASSIFICATION</label>
                            <select name="category" class="form-select bg-dark text-white">
                                <option value="Data Structures" {% if item.category == 'Data Structures' %}selected{% endif %}>Data Structures</option>
                                <option value="OS and Networks" {% if item.category == 'OS and Networks' %}selected{% endif %}>OS & Networks</option>
                                <option value="Math and Stats" {% if item.category == 'Math and Stats' %}selected{% endif %}>Math & Stats</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-info w-100 py-3 rounded-pill fw-bold shadow">SAVE CONFIGURATION</button>
                        <div class="text-center mt-4">
                            <a href="/" class="text-white-50 text-decoration-none small">Discard Changes</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
