<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuning Node</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #02040a; color: white; display: flex; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 100%; max-width: 500px; margin: auto; }
        .hero { background: linear-gradient(to right, #00d2ff, #9d50bb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .form-control, .form-select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass p-5">
            <h2 class="hero text-center mb-4">TUNING NODE</h2>
            <form action="/edit/{{ item._id }}" method="POST">
                <div class="mb-3"><label class="small fw-bold">TITLE</label><input type="text" name="title" class="form-control" value="{{ item.title }}" required></div>
                <div class="mb-3"><label class="small fw-bold">URL</label><input type="url" name="url" class="form-control" value="{{ item.url }}" required></div>
                <div class="mb-4"><label class="small fw-bold">CATEGORY</label><select name="category" class="form-select"><option value="Data Structures" {% if item.category == 'Data Structures' %}selected{% endif %}>Data Structures</option><option value="OS and Networks" {% if item.category == 'OS and Networks' %}selected{% endif %}>OS & Networks</option></select></div>
                <div class="d-grid gap-3"><button type="submit" class="btn btn-primary py-3">SAVE CONFIG</button><a href="/" class="text-white-50 text-center text-decoration-none small">Cancel</a></div>
            </form>
        </div>
    </div>
</body>
</html>
