<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Resource | KJC Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .kjc-navbar { background-color: #1a237e; color: white; padding: 15px; }
        .edit-container { max-width: 600px; margin-top: 50px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-update { background-color: #1a237e; color: white; font-weight: bold; }
        .btn-update:hover { background-color: #3949ab; color: white; }
    </style>
</head>
<body>

    <div class="kjc-navbar">
        <div class="container text-center">
            <span class="navbar-brand mb-0 h1">Modify Resource Entry</span>
        </div>
    </div>

    <div class="container edit-container">
        <div class="card p-4">
            <h4 class="mb-4 text-secondary text-center">Edit Submission</h4>
            
            <form action="/edit/{{ item._id }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Topic Title</label>
                    <input type="text" name="title" class="form-control" value="{{ item.title }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">URL / Link</label>
                    <input type="url" name="url" class="form-control" value="{{ item.url }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Subject Category</label>
                    <select name="category" class="form-select" required>
                        <option value="Data Structures" {% if item.category == 'Data Structures' %}selected{% endif %}>Data Structures</option>
                        <option value="OS and Networks" {% if item.category == 'OS and Networks' %}selected{% endif %}>Operating System and Networks</option>
                        <option value="Math and Stats" {% if item.category == 'Math and Stats' %}selected{% endif %}>Probability / Matrix Theory</option>
                        <option value="General" {% if item.category == 'General' %}selected{% endif %}>Understanding India / Economics</option>
                        <option value="English" {% if item.category == 'English' %}selected{% endif %}>Applied English</option>
                        <option value="Health" {% if item.category == 'Health' %}selected{% endif %}>Health and Wellness</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-update">Save Changes</button>
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
