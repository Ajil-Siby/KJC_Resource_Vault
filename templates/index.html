<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC AI Vault | Neural Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(255, 255, 255, 0.05); --neon-blue: #00d2ff; --neon-purple: #9d50bb; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Background Nebula */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            background: radial-gradient(circle at 20% 30%, rgba(0, 102, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(102, 0, 255, 0.1) 0%, transparent 50%);
            animation: nebulaMove 20s infinite alternate;
        }
        @keyframes nebulaMove { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -2; pointer-events: none; }

        /* RESTORED: Architect Node Launcher */
        .profile-launcher { position: fixed; top: 20px; left: 20px; z-index: 1000; text-decoration: none; }
        .profile-box { 
            background: var(--glass); backdrop-filter: blur(10px); 
            border: 1px solid var(--neon-blue); padding: 8px 18px; border-radius: 50px; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); transition: 0.3s; 
        }
        .profile-box:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--neon-blue); }

        /* Proper Search Bar Styling */
        .search-container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 50px;
            padding: 8px 15px; transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .search-input { background: transparent !important; border: none !important; color: white !important; box-shadow: none !important; }

        /* Card Pop-up Styling */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            height: 100%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
        }
        .glass-card:hover { border: 1px solid var(--neon-blue); box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3); transform: translateY(-10px); }
        
        /* FIXED SIZE SIDEBAR */
        .sidebar-fixed {
            height: fit-content !important; /* Forces the box to stop stretching */
            position: sticky;
            top: 20px;
            z-index: 10;
        }

        .hero-title { background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .btn-neon { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: white; border: none; font-weight: 700; border-radius: 30px; }
        
        /* FIXED FEEDBACK FORM TYPING VISIBILITY */
        .form-control { 
            background: rgba(0, 0, 0, 0.5) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white !important; 
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.7) !important;
            color: white !important;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <canvas id="starCanvas"></canvas>

    <a href="/portfolio" class="profile-launcher">
        <div class="profile-box">
            <span class="text-white small fw-bold"><i class="fas fa-user-astronaut me-2"></i>ARCHITECT NODE</span>
        </div>
    </a>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="hero-title display-3">NEURAL VAULT</h1>
            <p class="text-info text-uppercase fw-bold small" style="letter-spacing: 5px;">BSc AI & ML Data Interface</p>
        </div>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8">
                <form action="/" method="GET" class="search-container shadow-lg">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 text-info"><i class="fas fa-search"></i></span>
                        <input type="text" name="search" class="form-control search-input" placeholder="Search resources..." value="{{ request.args.get('search', '') }}">
                        {% if request.args.get('search') %}<a href="/" class="btn btn-outline-danger border-0 me-2"><i class="fas fa-times"></i></a>{% endif %}
                        <button class="btn btn-neon px-5" type="submit">EXECUTE</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card p-4 sidebar-fixed">
                    <h4 class="text-white mb-4">Inject Data</h4>
                    <form action="/add" method="POST">
                        <div class="mb-3"><label class="small text-info fw-bold mb-2">TITLE</label><input type="text" name="title" class="form-control" required></div>
                        <div class="mb-3"><label class="small text-info fw-bold mb-2">URL</label><input type="url" name="url" class="form-control" required></div>
                        <div class="mb-4"><label class="small text-info fw-bold mb-2">CLASS</label>
                            <select name="category" class="form-select bg-dark text-white border-secondary">
                                <option value="Data Structures">Data Structures</option>
                                <option value="OS and Networks">OS & Networks</option>
                                <option value="Math and Stats">Math & Stats</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-neon w-100 py-3">ADD TO VAULT</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="row g-4">
                    {% for item in items %}
                    <div class="col-md-6">
                        <div class="glass-card p-4 shadow">
                            <div class="flex-grow-1">
                                <h5 class="fw-bold mb-2 text-white">{{ item.title }}</h5>
                                <span class="badge border border-info text-info mb-4" style="background: rgba(0, 210, 255, 0.1);">{{ item.category or 'General' }}</span>
                            </div>
                            <div class="mt-auto pt-3 border-top">
                                <a href="{{ item.url }}" target="_blank" class="btn btn-outline-info w-100 rounded-pill mb-3 fw-bold">ACCESS SOURCE</a>
                                <div class="d-flex justify-content-between px-1">
                                    <a href="/edit/{{ item._id }}" class="text-white-50 small text-decoration-none">Modify</a>
                                    <a href="/delete/{{ item._id }}" class="text-danger small text-decoration-none" onclick="return confirm('Purge?')">Delete</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5 pt-5">
            <div class="col-md-8 text-center">
                <div class="glass-card p-5 border border-info">
                    <h3 class="hero-title mb-4">Transmit Feedback</h3>
                    <form action="/feedback" method="POST" class="text-start">
                        <div class="mb-3"><input type="text" name="name" class="form-control" placeholder="Your Name" required></div>
                        <div class="mb-4"><textarea name="message" class="form-control" rows="3" placeholder="Message..." required></textarea></div>
                        <div class="text-center"><button type="submit" class="btn btn-neon px-5 py-3">SEND DATA</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas'); const ctx = canvas.getContext('2d');
        let stars = []; const mouse = { x: null, y: null };
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        class Star {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.baseX = this.x; this.baseY = this.y; this.density = (Math.random() * 20) + 1; }
            draw() { ctx.fillStyle = 'rgba(173, 216, 230, 0.8)'; ctx.shadowBlur = 5; ctx.shadowColor = '#00d2ff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 120) { let force = (120 - distance) / 120; this.x -= (dx/distance) * force * this.density; this.y -= (dy/distance) * force * this.density; }
                else { if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 20; if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 20; }
            }
        }
        function init() { stars = []; for (let i = 0; i < 180; i++) stars.push(new Star()); }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.draw(); s.update(); }); requestAnimationFrame(animate); }
        resize(); init(); animate();
    </script>
</body>
</html>
