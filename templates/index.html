<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC AI Vault | Neural Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #06060c;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
        }

        body { 
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background Mesh */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #06060c 100%);
            z-index: -1;
        }
        .bg-animate::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent, var(--neon-purple), transparent);
            animation: rotate 20s linear infinite; opacity: 0.1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Glassmorphism Containers */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            transform: scale(1.02);
        }

        .hero-title {
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800; letter-spacing: -1px;
        }

        .btn-neon {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; font-weight: 600;
            box-shadow: 0 4px 15px rgba(157, 80, 187, 0.4);
        }
        .btn-neon:hover { color: white; filter: brightness(1.2); }

        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .form-control:focus { background: rgba(0, 0, 0, 0.5); color: white; border-color: var(--neon-blue); }
    </style>
</head>
<body>
    <div class="bg-animate"></div>

    <nav class="navbar navbar-dark py-3">
        <div class="container justify-content-center">
            <span class="navbar-brand hero-title fs-3">
                <i class="fas fa-microchip me-2"></i>KJC NEURAL VAULT
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <form action="/" method="GET" class="input-group glass-card p-1">
                    <input type="text" name="search" class="form-control border-0 bg-transparent" placeholder="Query the vault...">
                    <button class="btn btn-neon rounded-pill px-4 ms-2" type="submit">SEARCH</button>
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="glass-card p-4 sticky-top" style="top: 20px;">
                    <h4 class="hero-title mb-4"><i class="fas fa-terminal me-2"></i>Input Node</h4>
                    <form action="/add" method="POST">
                        <div class="mb-3">
                            <label class="small text-uppercase opacity-50">Core Topic</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small text-uppercase opacity-50">Data Stream URL</label>
                            <input type="url" name="url" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="small text-uppercase opacity-50">Classification</label>
                            <select name="category" class="form-select">
                                <option value="Data Structures">Data Structures</option>
                                <option value="OS and Networks">OS & Networks</option>
                                <option value="Math and Stats">Math & Stats</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-neon w-100 py-2">INJECT DATA</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <h3 class="mb-4 opacity-75"><i class="fas fa-stream me-2"></i>Active Resources</h3>
                <div class="row">
                    {% for item in items %}
                    <div class="col-md-6 mb-4">
                        <div class="glass-card p-3 h-100 d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold mb-0 text-white">{{ item.title }}</h5>
                                <i class="fas fa-brain text-info"></i>
                            </div>
                            <p class="small text-uppercase text-info mb-4" style="letter-spacing: 1px;">{{ item.category or 'General' }}</p>
                            <div class="mt-auto">
                                <a href="{{ item.url }}" target="_blank" class="btn btn-outline-info w-100 btn-sm mb-3 rounded-pill">ACCESS SOURCE</a>
                                <div class="d-flex justify-content-between px-2">
                                    <a href="/edit/{{ item._id }}" class="text-white-50 small text-decoration-none"><i class="fas fa-sliders-h"></i></a>
                                    <a href="/delete/{{ item._id }}" class="text-danger small text-decoration-none" onclick="return confirm('Purge data?')"><i class="fas fa-trash-alt"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
